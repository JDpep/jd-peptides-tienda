<svg viewBox="0 0 1440 620" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg">

      <!-- ═══════════════════════════════════════════════
           MAIN PEPTIDE CHAIN — RIGHT SIDE (x 870–1440)
           5 residues: Phe, Ala/Leu, His, Trp, Arg
           ═══════════════════════════════════════════════ -->
      <!-- Backbone zigzag -->
      <g stroke="#f0b429" stroke-width="2.4" fill="none">
        <line x1="870"  y1="300" x2="908"  y2="274"/>
        <line x1="908"  y1="274" x2="946"  y2="300"/>
        <line x1="946"  y1="300" x2="984"  y2="274"/>
        <line x1="984"  y1="274" x2="1022" y2="300"/>
        <line x1="1022" y1="300" x2="1060" y2="274"/>
        <line x1="1060" y1="274" x2="1098" y2="300"/>
        <line x1="1098" y1="300" x2="1136" y2="274"/>
        <line x1="1136" y1="274" x2="1174" y2="300"/>
        <line x1="1174" y1="300" x2="1212" y2="274"/>
        <line x1="1212" y1="274" x2="1250" y2="300"/>
      </g>
      <!-- Carbonyl C=O (double bond: two parallel lines) -->
      <g stroke="#f0b429" fill="none">
        <line x1="946"  y1="300" x2="946"  y2="338" stroke-width="2.2"/>
        <line x1="950"  y1="300" x2="950"  y2="336" stroke-width="1.2" opacity="0.55"/>
        <line x1="1060" y1="274" x2="1060" y2="236" stroke-width="2.2"/>
        <line x1="1064" y1="274" x2="1064" y2="238" stroke-width="1.2" opacity="0.55"/>
        <line x1="1174" y1="300" x2="1174" y2="338" stroke-width="2.2"/>
        <line x1="1178" y1="300" x2="1178" y2="336" stroke-width="1.2" opacity="0.55"/>
        <line x1="1250" y1="300" x2="1250" y2="262" stroke-width="2.2"/>
        <line x1="1254" y1="300" x2="1254" y2="264" stroke-width="1.2" opacity="0.55"/>
      </g>
      <!-- N atoms (black) -->
      <circle cx="870"  cy="300" r="7" fill="#1a1a1a" stroke="white" stroke-width="1.5"/>
      <circle cx="984"  cy="274" r="7" fill="#1a1a1a" stroke="white" stroke-width="1.5"/>
      <circle cx="1098" cy="300" r="7" fill="#1a1a1a" stroke="white" stroke-width="1.5"/>
      <circle cx="1212" cy="274" r="7" fill="#1a1a1a" stroke="white" stroke-width="1.5"/>
      <!-- Cα atoms (gold) -->
      <circle cx="908"  cy="274" r="5.5" fill="#f0b429" stroke="white" stroke-width="1.2"/>
      <circle cx="1022" cy="300" r="5.5" fill="#f0b429" stroke="white" stroke-width="1.2"/>
      <circle cx="1136" cy="274" r="5.5" fill="#f0b429" stroke="white" stroke-width="1.2"/>
      <circle cx="1250" cy="300" r="5.5" fill="#f0b429" stroke="white" stroke-width="1.2"/>
      <!-- C=O oxygen atoms (black) -->
      <circle cx="946"  cy="338" r="5" fill="#1a1a1a" stroke="white" stroke-width="1"/>
      <circle cx="1060" cy="236" r="5" fill="#1a1a1a" stroke="white" stroke-width="1"/>
      <circle cx="1174" cy="338" r="5" fill="#1a1a1a" stroke="white" stroke-width="1"/>
      <circle cx="1250" cy="262" r="5" fill="#1a1a1a" stroke="white" stroke-width="1"/>

      <!-- SIDE CHAIN 1: Phe (benzene ring) from Cα(908,274) -->
      <line x1="908" y1="274" x2="908" y2="228" stroke="#f0b429" stroke-width="1.8"/>
      <line x1="908" y1="228" x2="908" y2="202" stroke="#f0b429" stroke-width="1.8"/>
      <!-- Benzene: center(908,178), r=20 flat-top -->
      <polygon points="908,158 925.3,168 925.3,188 908,198 890.7,188 890.7,168"
               stroke="#f0b429" stroke-width="1.9" fill="rgba(240,180,41,0.07)"/>
      <!-- Inner ring (Kekulé alternating) -->
      <polygon points="908,164 921.2,171.5 921.2,186.5 908,194 894.8,186.5 894.8,171.5"
               stroke="#f0b429" stroke-width="1" fill="none" opacity="0.4"/>
      <circle cx="908" cy="202" r="4" fill="#f0b429"/>

      <!-- SIDE CHAIN 2: Leu (branched aliphatic) from Cα(1022,300) -->
      <line x1="1022" y1="300" x2="1022" y2="344" stroke="#f0b429" stroke-width="1.8"/>
      <line x1="1022" y1="344" x2="1000" y2="374" stroke="#f0b429" stroke-width="1.8"/>
      <line x1="1022" y1="344" x2="1044" y2="374" stroke="#f0b429" stroke-width="1.8"/>
      <circle cx="1000" cy="374" r="4.5" fill="#f0b429"/>
      <circle cx="1044" cy="374" r="4.5" fill="#f0b429"/>
      <circle cx="1022" cy="344" r="4"   fill="#f0b429"/>

      <!-- SIDE CHAIN 3: His (imidazole 5-ring) from Cα(1136,274) -->
      <line x1="1136" y1="274" x2="1136" y2="244" stroke="#f0b429" stroke-width="1.8"/>
      <line x1="1136" y1="244" x2="1136" y2="218" stroke="#f0b429" stroke-width="1.8"/>
      <!-- Imidazole ring (5-membered) center ≈ (1136,194) -->
      <polygon points="1136,174 1154,183 1150,206 1122,206 1118,183"
               stroke="#f0b429" stroke-width="1.9" fill="rgba(240,180,41,0.07)"/>
      <!-- N atoms in imidazole (black) -->
      <circle cx="1154" cy="183" r="6" fill="#1a1a1a" stroke="white" stroke-width="1.2"/>
      <circle cx="1118" cy="183" r="6" fill="#1a1a1a" stroke="white" stroke-width="1.2"/>
      <circle cx="1136" cy="218" r="4"  fill="#f0b429"/>

      <!-- SIDE CHAIN 4: Trp (indole bicyclic) from Cα(1250,300) -->
      <line x1="1250" y1="300" x2="1268" y2="272" stroke="#f0b429" stroke-width="1.8"/>
      <!-- 5-membered ring (pyrrole) -->
      <polygon points="1268,252 1286,240 1300,256 1290,276 1268,272"
               stroke="#f0b429" stroke-width="1.9" fill="rgba(240,180,41,0.06)"/>
      <!-- 6-membered ring (benzene fused) -->
      <polygon points="1286,240 1308,232 1322,248 1316,270 1300,276 1290,256"
               stroke="#f0b429" stroke-width="1.9" fill="rgba(240,180,41,0.05)"/>
      <!-- NH in pyrrole (black) -->
      <circle cx="1268" cy="272" r="6" fill="#1a1a1a" stroke="white" stroke-width="1.2"/>

      <!-- ═══════════════════════════════════════════════
           SECOND CHAIN — FAR RIGHT (x 1300–1440, y 380–520)
           ═══════════════════════════════════════════════ -->
      <g opacity="0.65">
        <g stroke="#f0b429" stroke-width="2" fill="none">
          <line x1="1310" y1="450" x2="1348" y2="424"/>
          <line x1="1348" y1="424" x2="1386" y2="450"/>
          <line x1="1386" y1="450" x2="1424" y2="424"/>
        </g>
        <!-- C=O -->
        <line x1="1386" y1="450" x2="1386" y2="488" stroke="#f0b429" stroke-width="2"/>
        <line x1="1390" y1="450" x2="1390" y2="486" stroke="#f0b429" stroke-width="1.2" opacity="0.5"/>
        <!-- Atoms -->
        <circle cx="1310" cy="450" r="6"   fill="#1a1a1a" stroke="white" stroke-width="1.2"/>
        <circle cx="1424" cy="424" r="6"   fill="#1a1a1a" stroke="white" stroke-width="1.2"/>
        <circle cx="1348" cy="424" r="5"   fill="#f0b429" stroke="white" stroke-width="1"/>
        <circle cx="1386" cy="450" r="5"   fill="#f0b429" stroke="white" stroke-width="1"/>
        <circle cx="1386" cy="488" r="4.5" fill="#1a1a1a" stroke="white" stroke-width="1"/>
        <!-- Tyr side chain: para-OH benzene -->
        <line x1="1348" y1="424" x2="1348" y2="384" stroke="#f0b429" stroke-width="1.8"/>
        <polygon points="1348,364 1365.3,374 1365.3,394 1348,404 1330.7,394 1330.7,374"
                 stroke="#f0b429" stroke-width="1.8" fill="rgba(240,180,41,0.07)"/>
        <polygon points="1348,370 1361.2,377 1361.2,391 1348,398 1334.8,391 1334.8,377"
                 stroke="#f0b429" stroke-width="0.9" fill="none" opacity="0.4"/>
        <!-- OH group on para position -->
        <line x1="1348" y1="364" x2="1348" y2="346" stroke="#f0b429" stroke-width="1.5"/>
        <circle cx="1348" cy="342" r="5" fill="#1a1a1a" stroke="white" stroke-width="1"/>
      </g>

      <!-- ═══════════════════════════════════════════════
           ALPHA HELIX — RIGHT EDGE (x 1370–1440, y 60–280)
           ═══════════════════════════════════════════════ -->
      <g opacity="0.5">
        <!-- Helix coil: overlapping elliptical arcs -->
        <path d="M 1375 90  Q 1440 105 1440 125 Q 1440 145 1375 160"
              stroke="#f0b429" stroke-width="2.2" fill="rgba(240,180,41,0.06)"/>
        <path d="M 1375 135 Q 1440 150 1440 170 Q 1440 190 1375 205"
              stroke="#f0b429" stroke-width="2.2" fill="rgba(240,180,41,0.06)"/>
        <path d="M 1375 180 Q 1440 195 1440 215 Q 1440 235 1375 250"
              stroke="#f0b429" stroke-width="2.2" fill="rgba(240,180,41,0.06)"/>
        <path d="M 1375 225 Q 1440 240 1440 260 Q 1440 280 1375 295"
              stroke="#f0b429" stroke-width="2.2" fill="rgba(240,180,41,0.06)"/>
        <!-- Helix axis -->
        <line x1="1375" y1="90" x2="1375" y2="295" stroke="#1a1a1a" stroke-width="1" stroke-dasharray="3,5" opacity="0.35"/>
        <!-- H-bond dashes (black) -->
        <line x1="1390" y1="108" x2="1390" y2="143" stroke="#1a1a1a" stroke-width="1.2" stroke-dasharray="2,4" opacity="0.4"/>
        <line x1="1395" y1="153" x2="1395" y2="188" stroke="#1a1a1a" stroke-width="1.2" stroke-dasharray="2,4" opacity="0.4"/>
        <line x1="1390" y1="198" x2="1390" y2="233" stroke="#1a1a1a" stroke-width="1.2" stroke-dasharray="2,4" opacity="0.4"/>
        <!-- Small residue dots on helix -->
        <circle cx="1375" cy="125" r="4" fill="#f0b429"/>
        <circle cx="1375" cy="170" r="4" fill="#f0b429"/>
        <circle cx="1375" cy="215" r="4" fill="#f0b429"/>
        <circle cx="1375" cy="260" r="4" fill="#f0b429"/>
      </g>

      <!-- ═══════════════════════════════════════════════
           LEFT SIDE DECORATION (x 0–220, opacity 0.45)
           ═══════════════════════════════════════════════ -->
      <g opacity="0.45">
        <!-- Short chain top-left -->
        <g stroke="#f0b429" stroke-width="2.2" fill="none">
          <line x1="0"   y1="210" x2="40"  y2="184"/>
          <line x1="40"  y1="184" x2="80"  y2="210"/>
          <line x1="80"  y1="210" x2="120" y2="184"/>
          <line x1="120" y1="184" x2="160" y2="210"/>
          <line x1="160" y1="210" x2="200" y2="184"/>
        </g>
        <!-- C=O -->
        <line x1="80"  y1="210" x2="80"  y2="248" stroke="#f0b429" stroke-width="2"/>
        <line x1="84"  y1="210" x2="84"  y2="246" stroke="#f0b429" stroke-width="1.1" opacity="0.5"/>
        <line x1="160" y1="210" x2="160" y2="248" stroke="#f0b429" stroke-width="2"/>
        <line x1="164" y1="210" x2="164" y2="246" stroke="#f0b429" stroke-width="1.1" opacity="0.5"/>
        <!-- Atoms -->
        <circle cx="0"   cy="210" r="6"   fill="#1a1a1a" stroke="white" stroke-width="1.2"/>
        <circle cx="120" cy="184" r="6"   fill="#1a1a1a" stroke="white" stroke-width="1.2"/>
        <circle cx="200" cy="184" r="6"   fill="#1a1a1a" stroke="white" stroke-width="1.2"/>
        <circle cx="40"  cy="184" r="5"   fill="#f0b429" stroke="white" stroke-width="1"/>
        <circle cx="80"  cy="210" r="5"   fill="#f0b429" stroke="white" stroke-width="1"/>
        <circle cx="160" cy="210" r="5"   fill="#f0b429" stroke="white" stroke-width="1"/>
        <circle cx="80"  cy="248" r="4.5" fill="#1a1a1a" stroke="white" stroke-width="1"/>
        <circle cx="160" cy="248" r="4.5" fill="#1a1a1a" stroke="white" stroke-width="1"/>
        <!-- Phe side chain from (40,184) -->
        <line x1="40" y1="184" x2="40" y2="144" stroke="#f0b429" stroke-width="1.8"/>
        <polygon points="40,124 57.3,134 57.3,154 40,164 22.7,154 22.7,134"
                 stroke="#f0b429" stroke-width="1.8" fill="rgba(240,180,41,0.07)"/>
        <polygon points="40,130 53.2,137.5 53.2,152.5 40,160 26.8,152.5 26.8,137.5"
                 stroke="#f0b429" stroke-width="0.9" fill="none" opacity="0.4"/>
        <!-- Simple side chain from (120,184) -->
        <line x1="120" y1="184" x2="120" y2="150" stroke="#f0b429" stroke-width="1.8"/>
        <line x1="120" y1="150" x2="104" y2="130" stroke="#f0b429" stroke-width="1.8"/>
        <line x1="120" y1="150" x2="136" y2="130" stroke="#f0b429" stroke-width="1.8"/>
        <circle cx="104" cy="130" r="4" fill="#f0b429"/>
        <circle cx="136" cy="130" r="4" fill="#f0b429"/>
        <circle cx="120" cy="150" r="3.5" fill="#f0b429"/>
      </g>

      <!-- Bottom-left chain (x 0–260, y 400–540) -->
      <g opacity="0.38">
        <g stroke="#f0b429" stroke-width="2" fill="none">
          <line x1="0"   y1="460" x2="44"  y2="434"/>
          <line x1="44"  y1="434" x2="88"  y2="460"/>
          <line x1="88"  y1="460" x2="132" y2="434"/>
          <line x1="132" y1="434" x2="176" y2="460"/>
          <line x1="176" y1="460" x2="220" y2="434"/>
        </g>
        <line x1="88"  y1="460" x2="88"  y2="496" stroke="#f0b429" stroke-width="2"/>
        <line x1="92"  y1="460" x2="92"  y2="494" stroke="#f0b429" stroke-width="1.1" opacity="0.5"/>
        <line x1="176" y1="460" x2="176" y2="496" stroke="#f0b429" stroke-width="2"/>
        <line x1="180" y1="460" x2="180" y2="494" stroke="#f0b429" stroke-width="1.1" opacity="0.5"/>
        <circle cx="0"   cy="460" r="6" fill="#1a1a1a" stroke="white" stroke-width="1.2"/>
        <circle cx="132" cy="434" r="6" fill="#1a1a1a" stroke="white" stroke-width="1.2"/>
        <circle cx="220" cy="434" r="6" fill="#1a1a1a" stroke="white" stroke-width="1.2"/>
        <circle cx="44"  cy="434" r="5" fill="#f0b429" stroke="white" stroke-width="1"/>
        <circle cx="88"  cy="460" r="5" fill="#f0b429" stroke="white" stroke-width="1"/>
        <circle cx="176" cy="460" r="5" fill="#f0b429" stroke="white" stroke-width="1"/>
        <circle cx="88"  cy="496" r="4.5" fill="#1a1a1a" stroke="white" stroke-width="1"/>
        <circle cx="176" cy="496" r="4.5" fill="#1a1a1a" stroke="white" stroke-width="1"/>
        <!-- Imidazole from (44,434) -->
        <line x1="44" y1="434" x2="44" y2="398" stroke="#f0b429" stroke-width="1.7"/>
        <polygon points="44,378 62,387 58,410 30,410 26,387"
                 stroke="#f0b429" stroke-width="1.8" fill="rgba(240,180,41,0.06)"/>
        <circle cx="62" cy="387" r="5" fill="#1a1a1a" stroke="white" stroke-width="1"/>
        <circle cx="26" cy="387" r="5" fill="#1a1a1a" stroke="white" stroke-width="1"/>
        <!-- Branched side chain from (132,434) -->
        <line x1="132" y1="434" x2="132" y2="404" stroke="#f0b429" stroke-width="1.7"/>
        <line x1="132" y1="404" x2="114" y2="385" stroke="#f0b429" stroke-width="1.7"/>
        <line x1="132" y1="404" x2="150" y2="385" stroke="#f0b429" stroke-width="1.7"/>
        <circle cx="114" cy="385" r="4" fill="#f0b429"/>
        <circle cx="150" cy="385" r="4" fill="#f0b429"/>
        <circle cx="132" cy="404" r="3.5" fill="#f0b429"/>
      </g>

      <!-- ═══════════════════════════════════════════════
           VERY SUBTLE CENTER HINTS (opacity 0.08)
           Just enough texture without obscuring text
           ═══════════════════════════════════════════════ -->
      <g opacity="0.08" stroke="#f0b429" stroke-width="1.5" fill="none">
        <line x1="440" y1="540" x2="480" y2="516"/>
        <line x1="480" y1="516" x2="520" y2="540"/>
        <line x1="520" y1="540" x2="560" y2="516"/>
        <circle cx="480" cy="516" r="3.5" fill="#1a1a1a" stroke="none"/>
        <circle cx="560" cy="516" r="3.5" fill="#1a1a1a" stroke="none"/>
        <circle cx="520" cy="540" r="3"   fill="#f0b429" stroke="none"/>
        <line x1="620" y1="70" x2="660" y2="48"/>
        <line x1="660" y1="48" x2="700" y2="70"/>
        <circle cx="660" cy="48" r="3.5" fill="#1a1a1a" stroke="none"/>
        <circle cx="700" cy="70" r="3"   fill="#f0b429" stroke="none"/>
        <!-- Tiny benzene top center -->
        <line x1="700" y1="70" x2="700" y2="92"/>
        <polygon points="700,102 710,107 710,117 700,122 690,117 690,107"
                 stroke="#f0b429" stroke-width="1.2" fill="none"/>
      </g>

    </svg>